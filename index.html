<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON UNIT | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <img src="logo_axon.png" alt="Opis obrazka">

    <style>
        :root {
            --bg: #000000;
            /* DOKŁADNY KOLOR TWOJEGO LOGA */
            --brand-pink: #ff007f; 
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Syncopate', sans-serif;
            position: relative;
        }

        /* --- LOGO W CENTRUM --- */
        .teaser-logo {
            max-width: clamp(250px, 35vw, 450px);
            height: auto;
            margin-bottom: 5px;
            /* Poświata w identycznym kolorze co logo */
            filter: drop-shadow(0 0 25px rgba(255, 0, 127, 0.4));
            animation: logo-pulse 4s infinite ease-in-out;
        }

        /* --- NAPIS SOON W KOLORZE LOGA --- */
        .soon-text {
            font-size: clamp(3rem, 18vw, 10rem);
            color: var(--brand-pink);
            letter-spacing: 25px;
            text-transform: uppercase;
            position: relative;
            padding-left: 25px;
            font-weight: 700;
            
            /* NEON GLOW DOPASOWANY DO LOGA */
            text-shadow: 
                0 0 10px var(--brand-pink),
                0 0 20px var(--brand-pink),
                0 0 40px var(--brand-pink),
                0 0 80px rgba(255, 0, 127, 0.3);
            
            animation: pulse-neon 3s infinite ease-in-out;
        }

        .brand-sub {
            color: var(--white);
            font-size: 0.7rem;
            letter-spacing: 12px;
            margin-top: 10px;
            opacity: 0.2;
            text-transform: uppercase;
        }

        /* --- X / TWITTER LINK --- */
        .social-container {
            position: absolute;
            bottom: 50px;
        }

        .x-link {
            text-decoration: none;
            display: inline-block;
            transition: 0.4s ease;
            opacity: 0.4;
        }

        .x-link svg {
            width: 28px;
            height: 28px;
            fill: var(--white);
        }

        .x-link:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .x-link:hover svg {
            /* Zmiana koloru ikony na kolor loga */
            fill: var(--brand-pink);
            filter: drop-shadow(0 0 15px var(--brand-pink));
        }

        /* --- ANIMACJE --- */
        @keyframes pulse-neon {
            0%, 100% { opacity: 0.9; transform: scale(1); filter: brightness(1); }
            50% { opacity: 1; transform: scale(1.02); filter: brightness(1.2); }
        }

        @keyframes logo-pulse {
            0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 15px rgba(255, 0, 127, 0.3)); }
            50% { transform: scale(1.03); filter: brightness(1.2) drop-shadow(0 0 35px rgba(255, 0, 127, 0.6)); }
        }

        /* Subtelny szum tła */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="noise"></div>

    <img src="logo_axon.png" alt="AXON UNIT" class="teaser-logo">

    <h1 class="soon-text">SOON</h1>
    
    <p class="brand-sub">AXON UNIT // EUROPE</p>

    <div class="social-container">
        <a href="https://x.com/axonesport" target="_blank" class="x-link" title="Follow us on X">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
            </svg>
        </a>
    </div>

</body>
</html>
