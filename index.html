<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON UNIT | WELCOME PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Rajdhani:wght@500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo_axon.png">
    <style>
        :root {
            --bg: #000000;
            --brand-pink: #ff007f; 
            --pink-glow: rgba(255, 0, 127, 0.4);
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            position: relative;
        }

        nav {
            position: absolute;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 50px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--white);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.3;
            transition: 0.4s ease;
        }

        /* NAPRAWIONE: Klasa active przypisana do HOME na tej stronie */
        .nav-links a:hover, .nav-links a.active {
            opacity: 1;
            color: var(--brand-pink);
            text-shadow: 0 0 10px var(--brand-pink);
        }

        .background-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at center, rgba(255, 0, 127, 0.1) 0%, transparent 70%),
                linear-gradient(215deg, transparent 48%, var(--pink-glow) 49%, transparent 50%),
                linear-gradient(125deg, transparent 38%, var(--pink-glow) 39%, transparent 40%);
            z-index: 1;
            opacity: 0.7;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .logo-img { width: 250px; filter: drop-shadow(0 0 15px var(--brand-pink)); }
        
        .royal-squad {
            font-size: 0.75rem;
            letter-spacing: 12px;
            color: var(--white);
            text-transform: uppercase;
            margin-bottom: 40px;
            font-weight: 700;
            opacity: 0.8;
        }

        .welcome-protocol {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(3rem, 10vw, 7.5rem);
            color: var(--brand-pink);
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(255, 0, 127, 0.4);
        }

        .info-bottom {
            font-size: 0.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 60px;
            font-weight: 700;
        }

        .join-button {
            display: inline-block;
            padding: 14px 50px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--brand-pink);
            color: white;
            text-decoration: none;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 3px;
            transition: 0.4s;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.2);
            text-transform: uppercase;
        }

        .join-button:hover {
            background: var(--brand-pink);
            box-shadow: 0 0 40px var(--brand-pink);
            transform: translateY(-3px);
        }

        .social-footer {
            position: absolute;
            bottom: 40px;
            z-index: 10;
            display: flex;
            gap: 30px;
        }

        .social-footer a {
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: 0.3s;
            opacity: 0.4;
        }

        .social-footer svg {
            width: 22px;
            height: 22px;
            fill: white;
            transition: 0.3s;
        }

        .social-footer a:hover {
            opacity: 1;
            transform: translateY(-3px);
        }

        .social-footer a:hover svg {
            fill: var(--brand-pink);
            filter: drop-shadow(0 0 10px var(--brand-pink));
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
