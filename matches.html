<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON UNIT | MATCH CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Rajdhani:wght@500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo_axon.png">
    <style>
        :root {
            --bg: #000000;
            --brand-pink: #ff007f; 
            --pink-glow: rgba(255, 0, 127, 0.4);
            --win-green: #00ff88;
            --loss-red: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Rajdhani', sans-serif;
            position: relative;
            padding-top: 150px;
            overflow-x: hidden;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 1000;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at center, rgba(255, 0, 127, 0.15) 0%, transparent 70%),
                linear-gradient(215deg, transparent 48%, var(--pink-glow) 49%, transparent 50%),
                linear-gradient(125deg, transparent 38%, var(--pink-glow) 39%, transparent 40%);
            z-index: 1;
            opacity: 0.5;
        }

        nav {
            position: fixed;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 50px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.3;
            transition: 0.4s;
        }

        .nav-links a:hover, .nav-links a.active {
            opacity: 1;
            color: var(--brand-pink);
            text-shadow: 0 0 10px var(--brand-pink);
        }

        .page-header {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-bottom: 60px;
        }

        .page-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--brand-pink);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
        }

        .section-label {
            width: 90%;
            max-width: 1000px;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7rem;
            color: var(--brand-pink);
            letter-spacing: 5px;
            margin-bottom: 20px;
            border-left: 3px solid var(--brand-pink);
            padding-left: 15px;
            text-transform: uppercase;
            position: relative;
            z-index: 10;
        }

        .matches-list {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 80px;
        }

        /* --- KARTA MECZU --- */
        .match-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 25px 45px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .match-card:hover {
            transform: translateX(10px);
            background: rgba(255, 255, 255, 0.04);
        }

        /* TYPY MECZÓW */
        .match-card.upcoming { border-left: 4px solid var(--brand-pink); }
        
        .match-card.win { 
            border-left: 4px solid var(--win-green);
            border-right: 1px solid rgba(0, 255, 136, 0.2);
        }
        .match-card.win:hover { box-shadow: 0 0 30px rgba(0, 255, 136, 0.1); }

        .match-card.loss { 
            border-left: 4px solid var(--loss-red);
            border-right: 1px solid rgba(255, 77, 77, 0.2);
        }
        .match-card.loss:hover { box-shadow: 0 0 30px rgba(255, 77, 77, 0.1); }

        /* ELEMENTY KARTY */
        .team {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 250px;
        }

        .team.right { flex-direction: row-reverse; text-align: right; }

        .team-logo {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
        }

        .team-name {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .score-info {
            text-align: center;
            flex: 1;
        }

        .status-tag {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 900;
        }

        .win .status-tag { color: var(--win-green); }
        .loss .status-tag { color: var(--loss-red); }
        .upcoming .status-tag { color: var(--brand-pink); }

        .score {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 5px;
        }

        .win .score { color: var(--win-green); text-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
        .loss .score { color: var(--loss-red); }
        .upcoming .score { color: rgba(255,255,255,0.2); font-size: 1.3rem; }

        .match-meta {
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* --- STOPKA --- */
        .social-footer {
            margin-top: auto;
            margin-bottom: 40px;
            display: flex;
            gap: 30px;
            z-index: 10;
        }

        .social-footer a { opacity: 0.4; transition: 0.3s; }
        .social-footer a:hover { opacity: 1; transform: translateY(-3px); }
        .social-footer svg { width: 22px; fill: white; }
        .social-footer a:hover svg { fill: var(--brand-pink); filter: drop-shadow(0 0 10px var(--brand-pink)); }

    </style>
</head>
