<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON UNIT | ROSTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Rajdhani:wght@500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo_axon.png">
    <style>
        :root {
            --bg: #000000;
            --brand-pink: #ff007f; 
            --pink-glow: rgba(255, 0, 127, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Rajdhani', sans-serif;
            position: relative;
            padding-top: 150px; /* Zwiększony padding dla nav */
            overflow-x: hidden;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 1000;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at center, rgba(255, 0, 127, 0.15) 0%, transparent 70%),
                linear-gradient(215deg, transparent 48%, var(--pink-glow) 49%, transparent 50%),
                linear-gradient(125deg, transparent 38%, var(--pink-glow) 39%, transparent 40%);
            z-index: 1;
            opacity: 0.5;
        }

        nav {
            position: fixed;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 50px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.3;
            transition: 0.4s;
        }

        /* NAPRAWIONE: Aktywny link teraz na Roster */
        .nav-links a:hover, .nav-links a.active {
            opacity: 1;
            color: var(--brand-pink);
            text-shadow: 0 0 10px var(--brand-pink);
        }

        .page-header {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-bottom: 60px;
        }

        .page-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--brand-pink);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
        }

        .roster-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            width: 90%;
            max-width: 1400px;
            padding-bottom: 120px;
        }

        .player-card {
            flex: 1;
            min-width: 240px;
            max-width: 260px;
            height: 400px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 0, 127, 0.2);
            position: relative;
            overflow: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .player-card:hover {
            border-color: var(--brand-pink);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.2);
            transform: translateY(-10px);
            background: rgba(255, 0, 127, 0.05);
        }

        .player-img {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 90%;
            width: auto;
            filter: grayscale(1) brightness(0.6);
            transition: 0.5s;
            pointer-events: none;
        }

        .player-card:hover .player-img {
            filter: grayscale(0) brightness(1);
            transform: translateX(-50%) scale(1.05);
        }

        .player-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 30px 10px;
            background: linear-gradient(to top, #000 30%, transparent);
            text-align: center;
            z-index: 2;
        }

        .player-nick {
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem;
            letter-spacing: 3px;
            color: white;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .player-role {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--brand-pink);
            text-transform: uppercase;
            font-weight: 700;
        }

        .social-footer {
            position: relative; /* Zmiana na relative w kontenerze flexowym body */
            margin-top: auto;
            margin-bottom: 40px;
            z-index: 10;
            display: flex;
            gap: 30px;
        }

        .social-footer a {
            text-decoration: none;
            opacity: 0.4;
            transition: 0.3s;
        }

        .social-footer svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .social-footer a:hover {
            opacity: 1;
            transform: translateY(-3px);
        }

        .social-footer a:hover svg {
            fill: var(--brand-pink);
            filter: drop-shadow(0 0 10px var(--brand-pink));
        }
    </style>
</head>
